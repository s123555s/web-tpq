<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPQ MTA Karanganom 1 - Hadist</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #059669; --secondary: #10b981; --accent: #14b8a6; --text: #1f2937; --text-light: #6b7280; }
        body { font-family: 'Poppins', sans-serif; color: var(--text); background: linear-gradient(to bottom, #fff, #f0fdf4); }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .navbar { position: sticky; top: 0; z-index: 1000; background: linear-gradient(135deg, var(--primary), var(--secondary)); box-shadow: 0 10px 30px rgba(5, 150, 105, 0.2); padding: 1rem 0; }
        .navbar-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { color: white; font-size: 1.8rem; font-weight: 900; display: flex; align-items: center; gap: 1rem; text-decoration: none; }
        .navbar-brand i { font-size: 2.2rem; }
        .nav-menu { display: flex; list-style: none; background: rgba(255,255,255,0.1); border-radius: 50px; padding: 0.5rem; backdrop-filter: blur(10px); }
        .nav-link { color: white; text-decoration: none; padding: 0.8rem 1.5rem; display: block; font-weight: 600; border-radius: 40px; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { background: white; color: var(--primary); transform: translateY(-2px); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .section { padding: 5rem 2rem; }
        .section-title { font-size: 3rem; text-align: center; margin-bottom: 1rem; color: var(--primary); position: relative; display: inline-block; width: 100%; }
        .section-subtitle { text-align: center; color: var(--text-light); font-size: 1.2rem; margin-bottom: 3rem; }
        .section-title::after { content: ''; position: absolute; width: 60px; height: 4px; background: linear-gradient(90deg, var(--secondary), var(--accent)); bottom: -15px; left: 50%; transform: translateX(-50%); border-radius: 2px; }
        
        .search-box { position: relative; margin-bottom: 2rem; }
        .search-box input { width: 100%; padding: 1rem 1rem 1rem 3rem; border: 2px solid var(--primary); border-radius: 50px; font-size: 1rem; font-family: 'Poppins', sans-serif; transition: all 0.3s; }
        .search-box input:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1); }
        .search-box i { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--primary); }
        
        .hadist-card { background: white; border-left: 4px solid var(--primary); border-radius: 15px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 5px 20px rgba(0,0,0,0.08); transition: all 0.3s; }
        .hadist-card:hover { transform: translateX(5px); box-shadow: 0 10px 30px rgba(5, 150, 105, 0.15); }
        .hadist-title { font-size: 1.4rem; color: var(--primary); margin-bottom: 1rem; display: flex; justify-content: space-between; }
        .hadist-arab { background: linear-gradient(135deg, #f0fdf4, #dcfce7); padding: 1.5rem; border-radius: 12px; border-left: 4px solid var(--primary); margin: 1rem 0; font-size: 1.2rem; line-height: 2; text-align: right; font-family: Arial, sans-serif; }
        .hadist-meaning { background: linear-gradient(135deg, #f0fdf4, #ccfbf1); padding: 1.5rem; border-radius: 12px; margin: 1rem 0; line-height: 1.8; font-style: italic; }
        .hadist-ref { display: inline-block; background: linear-gradient(135deg, var(--secondary), var(--accent)); color: white; padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        
        .footer { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
        
        @media (max-width: 768px) { .section-title { font-size: 2rem; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand"><i class="fas fa-mosque"></i> TPQ MTA Karanganom 1</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Beranda</a></li>
                <li><a href="program.html" class="nav-link">Program</a></li>
                <li><a href="hadist.html" class="nav-link active">Hadist</a></li>
                <li><a href="quran.html" class="nav-link">Al-Quran</a></li>
            </ul>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <h2 class="section-title">Hadist Pilihan</h2>
            <p class="section-subtitle">Kumpulan hadist mulia untuk panduan hidup</p>

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="hadistSearch" placeholder="Cari hadist..." onkeyup="filterHadist()">
            </div>

            <div id="hadistContainer"></div>
        </div>
    </section>

    <footer class="footer">
        <p style="font-weight: 600; font-size: 1.1rem;">Semoga website ini bermanfaat untuk semua santri</p>
        <p style="margin-top: 0.5rem; opacity: 0.9;">&copy; 2024 TPQ MTA Karanganom 1 - Membentuk Generasi Quran Masa Depan</p>
    </footer>

    <script>
        const hadistData = [
            { title: "Hadist tentang Ilmu", arab: "عَنْ أَبِي هُرَيْرَةَ، عَنِ النَّبِيِّ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ قَالَ: مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا، سَهَّلَ اللَّهُ لَهُ طَرِيقًا إِلَى الْجَنَّةِ", meaning: "Dari Abu Hurairah, dari Nabi Muhammad SAW bersabda: Barangsiapa menempuh jalan untuk mencari ilmu, maka Allah memudahkan baginya jalan menuju surga.", reference: "HR. Muslim" },
            { title: "Hadist tentang Adab", arab: "عَنْ عَبْدِ اللَّهِ بْنِ عُمَرَ قَالَ: قَالَ رَسُولُ اللَّهِ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: الْكَبِيرُ الْكَبِيرُ أَنْ تَبِرَّ وَالِدَيْكَ", meaning: "Dari Abdullah bin Umar berkata: Rasulullah SAW bersabda: Kebesaran sejati adalah berbuat baik kepada kedua orang tuamu.", reference: "HR. Al-Bukhari dan Muslim" },
            { title: "Hadist tentang Sebaik-baik Orang", arab: "عَنْ عَائِشَةَ، قَالَتْ: سَأَلْتُ رَسُولَ اللَّهِ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: أَيُّ النَّاسِ أَحْسَنُ خُلُقًا؟ قَالَ: أَحْسَنُهُمْ أَخْلَاقًا", meaning: "Dari Aisyah berkata: Saya bertanya kepada Rasulullah SAW, siapa orang terbaik? Beliau menjawab: Orang yang terbaik akhlaknya.", reference: "HR. At-Tirmidzi" },
            { title: "Hadist tentang Kesabaran", arab: "عَنْ أَبِي سَعِيدٍ الْخُدْرِيِّ قَالَ: قَالَ النَّبِيُّ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ: مَا أُعْطِيَ أَحَدٌ عَطَاءً خَيْرًا وَأَوْسَعَ مِنَ الصَّبْرِ", meaning: "Dari Abu Said Al-Khudri berkata: Nabi Muhammad SAW bersabda: Tidak ada pemberian yang lebih baik dan lebih luas daripada kesabaran.", reference: "HR. Al-Bukhari" }
        ];

        function renderHadist() {
            const container = document.getElementById('hadistContainer');
            container.innerHTML = hadistData.map(h => `
                <div class="hadist-card">
                    <div class="hadist-title">${h.title}<span>✨</span></div>
                    <div class="hadist-arab">${h.arab}</div>
                    <div class="hadist-meaning">"${h.meaning}"</div>
                    <span class="hadist-ref">${h.reference}</span>
                </div>
            `).join('');
        }

        function filterHadist() {
            const search = document.getElementById('hadistSearch').value.toLowerCase();
            const filtered = hadistData.filter(h => h.title.toLowerCase().includes(search) || h.meaning.toLowerCase().includes(search));
            const container = document.getElementById('hadistContainer');
            container.innerHTML = filtered.map(h => `
                <div class="hadist-card">
                    <div class="hadist-title">${h.title}<span>✨</span></div>
                    <div class="hadist-arab">${h.arab}</div>
                    <div class="hadist-meaning">"${h.meaning}"</div>
                    <span class="hadist-ref">${h.reference}</span>
                </div>
            `).join('');
        }

        renderHadist();
    </script>
</body>
</html>
