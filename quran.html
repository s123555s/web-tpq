<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPQ MTA Karanganom 1 - Al-Quran</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #059669; --secondary: #10b981; --accent: #14b8a6; --text: #1f2937; --text-light: #6b7280; }
        body { font-family: 'Poppins', sans-serif; color: var(--text); background: linear-gradient(to bottom, #fff, #f0fdf4); }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .navbar { position: sticky; top: 0; z-index: 1000; background: linear-gradient(135deg, var(--primary), var(--secondary)); box-shadow: 0 10px 30px rgba(5, 150, 105, 0.2); padding: 1rem 0; }
        .navbar-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { color: white; font-size: 1.8rem; font-weight: 900; display: flex; align-items: center; gap: 1rem; text-decoration: none; }
        .navbar-brand i { font-size: 2.2rem; }
        .nav-menu { display: flex; list-style: none; background: rgba(255,255,255,0.1); border-radius: 50px; padding: 0.5rem; backdrop-filter: blur(10px); }
        .nav-link { color: white; text-decoration: none; padding: 0.8rem 1.5rem; display: block; font-weight: 600; border-radius: 40px; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { background: white; color: var(--primary); transform: translateY(-2px); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .section { padding: 5rem 2rem; }
        .section-title { font-size: 3rem; text-align: center; margin-bottom: 1rem; color: var(--primary); position: relative; display: inline-block; width: 100%; }
        .section-subtitle { text-align: center; color: var(--text-light); font-size: 1.2rem; margin-bottom: 3rem; }
        .section-title::after { content: ''; position: absolute; width: 60px; height: 4px; background: linear-gradient(90deg, var(--secondary), var(--accent)); bottom: -15px; left: 50%; transform: translateX(-50%); border-radius: 2px; }
        
        .quran-selector { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); margin-bottom: 2rem; border-top: 4px solid var(--primary); }
        .quran-selector label { display: block; font-weight: 700; color: var(--primary); margin-bottom: 1rem; font-size: 1.1rem; }
        .quran-selector select { width: 100%; padding: 1rem; border: 2px solid var(--primary); border-radius: 12px; font-family: 'Poppins', sans-serif; font-size: 1rem; color: var(--text); cursor: pointer; transition: all 0.3s; }
        .quran-selector select:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1); }
        
        .quran-display { background: white; border-radius: 15px; padding: 2.5rem; box-shadow: 0 5px 20px rgba(0,0,0,0.08); border-left: 4px solid var(--primary); }
        .surah-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 2px solid #f0fdf4; }
        .surah-info h2 { font-size: 2.5rem; color: var(--primary); margin-bottom: 0.5rem; }
        .surah-info p { color: var(--text-light); font-size: 1rem; }
        .surah-number { background: linear-gradient(135deg, var(--secondary), var(--accent)); color: white; padding: 1.5rem; border-radius: 15px; text-align: center; min-width: 120px; box-shadow: 0 5px 20px rgba(5, 150, 105, 0.2); }
        .surah-number p:first-child { font-size: 0.85rem; opacity: 0.9; }
        .surah-number p:last-child { font-size: 2.5rem; font-weight: 900; }
        
        .ayah { margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid #f0fdf4; }
        .ayah:last-child { border-bottom: none; }
        .ayah-number { display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--secondary), var(--accent)); color: white; width: 40px; height: 40px; border-radius: 50%; font-weight: 700; margin-bottom: 0.8rem; box-shadow: 0 5px 15px rgba(5, 150, 105, 0.2); }
        .ayah-text { background: linear-gradient(135deg, #f0fdf4, #dcfce7); padding: 1.5rem; border-radius: 12px; border-left: 4px solid var(--primary); margin: 1rem 0; font-size: 1.3rem; line-height: 2; text-align: right; font-family: Arial, sans-serif; }
        .ayah-translation { background: linear-gradient(135deg, #f0fdf4, #ccfbf1); padding: 1rem; border-radius: 12px; border-left: 4px solid var(--accent); margin: 1rem 0; line-height: 1.8; font-style: italic; }
        
        .footer { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-align: center; padding: 2rem; margin-top: 4rem; }
        
        @media (max-width: 768px) { .section-title { font-size: 2rem; } .surah-header { flex-direction: column; gap: 1rem; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand"><i class="fas fa-mosque"></i> TPQ MTA Karanganom 1</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Beranda</a></li>
                <li><a href="program.html" class="nav-link">Program</a></li>
                <li><a href="hadist.html" class="nav-link">Hadist</a></li>
                <li><a href="quran.html" class="nav-link active">Al-Quran</a></li>
            </ul>
        </div>

    <section class="section">
        <div class="container">
            <h2 class="section-title">Al-Quran</h2>
            <p class="section-subtitle">Baca surat-surat Al-Quran Juz 30 dengan terjemahan lengkap</p>

            <div class="quran-selector">
                <label for="surahSelect">Pilih Surat:</label>
                <select id="surahSelect" onchange="displaySurah()">
                    <option value="78">78. An-Naba - Berita Besar (40 Ayat)</option>
                    <option value="79">79. An-Nazi'at - Para Malaikat Yang Mencabut (46 Ayat)</option>
                    <option value="80">80. Abasa - Dia Bermuram Durja (42 Ayat)</option>
                    <option value="81">81. At-Takwir - Menggulung (29 Ayat)</option>
                    <option value="82">82. Al-Infitar - Terbelah (19 Ayat)</option>
                    <option value="83">83. Al-Muthaffifin - Para Pengcurang (36 Ayat)</option>
                    <option value="84">84. Al-Insyiqaq - Terbelah (25 Ayat)</option>
                    <option value="85">85. Al-Buruj - Bintang-bintang (22 Ayat)</option>
                    <option value="86">86. At-Tariq - Bintang Fajar (17 Ayat)</option>
                    <option value="87">87. Al-A'la - Yang Paling Tinggi (19 Ayat)</option>
                    <option value="88">88. Al-Ghasyiah - Penutup (26 Ayat)</option>
                    <option value="89">89. Al-Fajr - Fajar (30 Ayat)</option>
                    <option value="90">90. Al-Balad - Negeri (20 Ayat)</option>

                    <option value="97">97. Al-Qadr - Kemuliaan/Kekuatan (5 Ayat)</option>
                    <option value="98">98. Al-Bayyinah - Bukti Nyata (8 Ayat)</option>
                    <option value="99">99. Az-Zalzalah - Guncangan (8 Ayat)</option>
                    <option value="100">100. Al-'Adiyat - Kuda Perang (11 Ayat)</option>
                    <option value="101">101. Al-Qari'ah - Hari Kiamat (11 Ayat)</option>

                    <option value="107">107. Al-Ma'un - Barang-barang Berguna (7 Ayat)</option>
                    <option value="108">108. Al-Kautsar - Keberuntungan (3 Ayat)</option>
                    <option value="109">109. Al-Kafirun - Orang-orang Kafir (6 Ayat)</option>
                    <option value="110">110. An-Nasr - Pertolongan (3 Ayat)</option>
                    <option value="111">111. Al-Lahab - Nyaladan Api (5 Ayat)</option>
                    <option value="112">112. Al-Ikhlas - Keikhlasan (4 Ayat)</option>
                    <option value="113">113. Al-Falaq - Fajar/Subuh (5 Ayat)</option>
                    <option value="114">114. An-Nas - Manusia (6 Ayat)</option>
                </select>
            </div>

            <div class="quran-display" id="quranDisplay"></div>
        </div>
    </section>

    <footer class="footer">
        <p style="font-weight: 600; font-size: 1.1rem;">Semoga website ini bermanfaat untuk semua santri</p>
        <p style="margin-top: 0.5rem; opacity: 0.9;">&copy; 2024 TPQ MTA Karanganom 1 - Membentuk Generasi Quran Masa Depan</p>
    </footer>

    <script>
        const quranData = {
            78: { name: "An-Naba", meaning: "Berita Besar", ayahs: [{ num: 1, arab: "عَمَّ يَتَسَاءَلُونَ", trans: "Tentang apakah mereka saling bertanya-tanya?" }, { num: 2, arab: "عَنِ النَّبَإِ الْعَظِيمِ", trans: "Tentang berita besar (hari kiamat)," }, { num: 3, arab: "الَّذِي هُمْ فِيهِ مُخْتَلِفُونَ", trans: "yang mereka padanya berselisih paham." }, { num: 4, arab: "كَلَّا سَيَعْلَمُونَ", trans: "Sekali-kali tidak, nanti mereka akan mengetahui." }, { num: 5, arab: "ثُمَّ كَلَّا سَيَعْلَمُونَ", trans: "Kemudian sekali-kali tidak, nanti mereka akan mengetahui." }] },
            79: { name: "An-Nazi'at", meaning: "Para Malaikat Yang Mencabut", ayahs: [{ num: 1, arab: "وَالنَّازِعَاتِ غَرْقًا", trans: "Demi malaikat-malaikat yang mencabut (nyawa) dengan paksa," }, { num: 2, arab: "وَالنَّاشِطَاتِ نَشْطًا", trans: "dan malaikat-malaikat yang mengeluarkan (nyawa) dengan lembut," }, { num: 3, arab: "وَالسَّابِحَاتِ سَبْحًا", trans: "dan malaikat-malaikat yang melayang dengan cepat," }, { num: 4, arab: "فَالسَّابِقَاتِ سَبْقًا", trans: "dan malaikat-malaikat yang berlari cepat (melaksanakan perintah)," }, { num: 5, arab: "فَالْمُدَبِّرَاتِ أَمْرًا", trans: "dan mereka yang mengurus segala urusan," }] },
            80: { name: "Abasa", meaning: "Dia Bermuram Durja", ayahs: [{ num: 1, arab: "عَبَسَ وَتَوَلَّىٰ", trans: "Dia (Nabi Muhammad) bermuram durja dan berpaling," }, { num: 2, arab: "أَن جَاءَهُ الْأَعْمَىٰ", trans: "karena datang seorang buta kepadanya (Ibn Ummu Maktum)," }, { num: 3, arab: "وَمَا يُدْرِيكَ لَعَلَّهُ يَزِكَّىٰ", trans: "dan bagaimana kamu ketahui, boleh jadi dia ingin membersihkan diri (dari dosa)," }, { num: 4, arab: "أَوْ يَذَّكَّرُ فَتَنفَعَهُ الذِّكْرَىٰ", trans: "atau dia ingin mengambil pelajaran, sehingga pelajaran itu memberi manfaat kepadanya." }, { num: 5, arab: "أَمَّا مَن اسْتَغْنَىٰ", trans: "Adapun orang-orang yang merasa cukup (mampu)," }] },
            81: { name: "At-Takwir", meaning: "Menggulung", ayahs: [{ num: 1, arab: "إِذَا الشَّمْسُ كُوِّرَتْ", trans: "Apabila matahari digulung," }, { num: 2, arab: "وَإِذَا النُّجُومُ انكَدَرَتْ", trans: "dan apabila bintang-bintang berjatuhan," }, { num: 3, arab: "وَإِذَا الْبِحَارُ فُجِّرَتْ", trans: "dan apabila lautan-lautan meledak," }, { num: 4, arab: "وَإِذَا الْقُبُورُ بُعْثِرَتْ", trans: "dan apabila kuburan-kuburan dikuak," }, { num: 5, arab: "عَلِمَتْ نَفْسٌ مَّا قَدَّمَتْ وَأَخَّرَتْ", trans: "maka setiap jiwa mengetahui apa yang telah dihadapkan dan apa yang ditinggalkannya." }] },
            82: { name: "Al-Infitar", meaning: "Terbelah", ayahs: [{ num: 1, arab: "إِذَا السَّمَاءُ انفَطَرَتْ", trans: "Apabila langit terbelah," }, { num: 2, arab: "وَإِذَا الْكَوَاكِبُ انتَثَرَتْ", trans: "dan apabila bintang-bintang bertebaran," }, { num: 3, arab: "وَإِذَا الْبِحَارُ فُجِّرَتْ", trans: "dan apabila lautan-lautan meledak keluar," }, { num: 4, arab: "وَإِذَا الْقُبُورُ بُعْثِرَتْ", trans: "dan apabila kuburan-kuburan dibalik," }, { num: 5, arab: "عَلِمَتْ نَفْسٌ مَّا قَدَّمَتْ وَأَخَّرَتْ", trans: "maka setiap jiwa mengetahui apa yang telah dihadapkan dan apa yang ditinggalkannya." }] },
            112: { name: "Al-Ikhlas", meaning: "Keikhlasan", ayahs: [{ num: 1, arab: "قُلْ هُوَ اللَّهُ أَحَدٌ", trans: "Katakanlah: \"Dia-lah Allah, Yang Maha Esa," }, { num: 2, arab: "اللَّهُ الصَّمَدُ", trans: "Allah adalah Zat yang bergantung padanya segala sesuatu," }, { num: 3, arab: "لَمْ يَلِدْ وَلَمْ يُولَدْ", trans: "Dia tidak beranak dan tidak pula diperanakkan," }, { num: 4, arab: "وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ", trans: "dan tidak ada seorang pun yang setara dengan Dia.\"" }] },
            113: { name: "Al-Falaq", meaning: "Fajar/Subuh", ayahs: [{ num: 1, arab: "قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ", trans: "Katakanlah: \"Aku berlindung kepada Rabb fajar (subuh)," }, { num: 2, arab: "مِن شَرِّ مَا خَلَقَ", trans: "dari kejahatan apa yang telah diciptakan-Nya," }, { num: 3, arab: "وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ", trans: "dan dari kejahatan malam apabila telah gelap gulita," }, { num: 4, arab: "وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ", trans: "dan dari kejahatan para penyihir yang menghembus pada buhul-buhul," }, { num: 5, arab: "وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ", trans: "dan dari kejahatan orang yang iri hati apabila dia iri hati.\"" }] },
            114: { name: "An-Nas", meaning: "Manusia", ayahs: [{ num: 1, arab: "قُلْ أَعُوذُ بِرَبِّ النَّاسِ", trans: "Katakanlah: \"Aku berlindung kepada Rabb manusia," }, { num: 2, arab: "مَلِكِ النَّاسِ", trans: "Raja manusia," }, { num: 3, arab: "إِلَٰهِ النَّاسِ", trans: "Tuhan yang disembah oleh manusia," }, { num: 4, arab: "مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ", trans: "dari kejahatan (bisikan) syaitan yang sering bersembunyi," }, { num: 5, arab: "الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ", trans: "yang membisikkan (kejahatan) ke dalam dada manusia," }, { num: 6, arab: "مِنَ الْجِنَّةِ وَالنَّاسِ", trans: "dari (golongan) jin dan manusia.\"" }] }
        };

        function displaySurah() {
            const surahNum = parseInt(document.getElementById('surahSelect').value);
            const surah = quranData[surahNum];
            const display = document.getElementById('quranDisplay');
            
            display.innerHTML = `
                <div class="surah-header">
                    <div class="surah-info">
                        <h2>Surat ${surah.name}</h2>
                        <p>"${surah.meaning}" • ${surah.ayahs.length} Ayat</p>
                    </div>
                    <div class="surah-number">
                        <p>Surat</p>
                        <p>${surahNum}</p>
                    </div>
                </div>
                ${surah.ayahs.map(ayah => `
                    <div class="ayah">
                        <div class="ayah-number">${ayah.num}</div>
                        <div class="ayah-text">${ayah.arab}</div>
                        <div class="ayah-translation">${ayah.trans}</div>
                    </div>
                `).join('')}
            `;
        }

        displaySurah();
    </script>
</body>
</html>
