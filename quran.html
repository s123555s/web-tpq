<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>TPQ MTA Karanganom 1 - Al-Quran</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; overflow-x: hidden; }
        :root { --primary: #059669; --secondary: #10b981; --accent: #14b8a6; --text: #1f2937; --text-light: #6b7280; }
        body { font-family: 'Poppins', sans-serif; color: var(--text); background: linear-gradient(to bottom, #fff, #f0fdf4); }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .navbar { position: sticky; top: 0; z-index: 1000; background: linear-gradient(135deg, var(--primary), var(--secondary)); box-shadow: 0 5px 20px rgba(5, 150, 105, 0.2); padding: 1rem 1rem; }
        .navbar-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 1rem; }
        .navbar-brand { color: white; font-size: 1.3rem; font-weight: 900; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .navbar-brand i { font-size: 1.5rem; }
        
        .hamburger { display: flex; flex-direction: column; gap: 0.4rem; background: none; border: none; cursor: pointer; padding: 0.5rem; }
        .hamburger span { width: 25px; height: 3px; background: white; border-radius: 2px; transition: all 0.3s; }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(10px, 10px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); }
        
        .nav-menu { position: absolute; top: 100%; right: 1rem; list-style: none; background: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); overflow: hidden; display: none; flex-direction: column; min-width: 200px; z-index: 999; }
        .nav-menu.active { display: flex; }
        .nav-item { padding: 0; }
        .nav-link { color: var(--text); text-decoration: none; padding: 1rem 1.5rem; display: block; font-weight: 600; transition: all 0.3s; border-left: 4px solid transparent; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-left-color: var(--primary); color: var(--primary); }
        
        @media (min-width: 768px) {
            .navbar { padding: 1rem 2rem; }
            .navbar-container { padding: 0 2rem; }
            .hamburger { display: none; }
            .nav-menu { position: static; display: flex !important; flex-direction: row; background: none; box-shadow: none; gap: 0.3rem; min-width: auto; }
            .nav-link { color: white; padding: 0.7rem 1.2rem; border-left: none; border-radius: 30px; }
            .nav-link:hover, .nav-link.active { background: white; color: var(--primary); border-left-color: transparent; }
        }
        
        .container { max-width: 100%; margin: 0 auto; padding: 0 1rem; }
        .section { padding: 2.5rem 1rem; }
        .section-title { font-size: 1.8rem; text-align: center; margin-bottom: 0.5rem; color: var(--primary); position: relative; display: inline-block; width: 100%; }
        .section-subtitle { text-align: center; color: var(--text-light); font-size: 0.95rem; margin-bottom: 1.5rem; }
        .section-title::after { content: ''; position: absolute; width: 40px; height: 3px; background: linear-gradient(90deg, var(--secondary), var(--accent)); bottom: -10px; left: 50%; transform: translateX(-50%); }
        
        .quran-selector { background: white; padding: 1.2rem; border-radius: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); margin-bottom: 1.5rem; border-top: 3px solid var(--primary); }
        .quran-selector label { display: block; font-weight: 700; color: var(--primary); margin-bottom: 0.8rem; font-size: 1rem; }
        .quran-selector select { width: 100%; padding: 0.8rem; border: 2px solid var(--primary); border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 0.95rem; color: var(--text); cursor: pointer; }
        .quran-selector select:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1); }
        
        .quran-display { background: white; border-radius: 10px; padding: 1.2rem; box-shadow: 0 3px 10px rgba(0,0,0,0.08); border-left: 3px solid var(--primary); }
        .surah-header { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 2px solid #f0fdf4; }
        .surah-info h2 { font-size: 1.6rem; color: var(--primary); margin-bottom: 0.3rem; }
        .surah-info p { color: var(--text-light); font-size: 0.9rem; }
        .surah-number { background: linear-gradient(135deg, var(--secondary), var(--accent)); color: white; padding: 1rem; border-radius: 10px; text-align: center; box-shadow: 0 3px 10px rgba(5, 150, 105, 0.2); }
        .surah-number p:first-child { font-size: 0.8rem; opacity: 0.9; }
        .surah-number p:last-child { font-size: 2rem; font-weight: 900; }
        
        .ayah { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #f0fdf4; }
        .ayah:last-child { border-bottom: none; }
        .ayah-number { display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--secondary), var(--accent)); color: white; width: 32px; height: 32px; border-radius: 50%; font-weight: 700; margin-bottom: 0.8rem; font-size: 0.9rem; }
        .ayah-text { background: linear-gradient(135deg, #f0fdf4, #dcfce7); padding: 1rem; border-radius: 8px; border-left: 3px solid var(--primary); margin: 0.8rem 0; font-size: 1.15rem; line-height: 1.8; text-align: right; font-family: Arial, sans-serif; }
        .ayah-translation { background: linear-gradient(135deg, #f0fdf4, #ccfbf1); padding: 0.8rem; border-radius: 8px; border-left: 3px solid var(--accent); margin: 0.8rem 0; line-height: 1.6; font-style: italic; font-size: 0.9rem; }
        
        .footer { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-align: center; padding: 2rem 1rem; margin-top: 2rem; font-size: 0.9rem; position: relative; overflow: hidden; }
        .footer-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5rem; opacity: 0.15; font-weight: 700; white-space: nowrap; pointer-events: none; }
        .footer p { margin: 0.3rem 0; position: relative; z-index: 1; }
        
        @media (min-width: 600px) {
            .section { padding: 3rem 1.5rem; }
            .section-title { font-size: 2.2rem; }
            .surah-header { flex-direction: row; justify-content: space-between; align-items: flex-start; }
            .quran-display { padding: 1.5rem; }
            .ayah-text { font-size: 1.25rem; }
        }
        
        @media (min-width: 768px) {
            .navbar { padding: 1rem 2rem; }
            .section { padding: 4rem 2rem; }
            .section-title { font-size: 2.8rem; }
            .container { max-width: 1200px; padding: 0 2rem; }
            .quran-display { padding: 2.5rem; }
            .quran-selector { padding: 2rem; }
            .surah-info h2 { font-size: 2.5rem; }
            .ayah-text { font-size: 1.3rem; padding: 1.5rem; }
            .footer { padding: 2rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <i class="fas fa-mosque"></i>
                <span>TPQ MTA</span>
            </a>
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li class="nav-item"><a href="index.html" class="nav-link">Beranda</a></li>
                <li class="nav-item"><a href="program.html" class="nav-link">Program</a></li>
                <li class="nav-item"><a href="pengajar.html" class="nav-link">Pengajar</a></li>
                <li class="nav-item"><a href="hadist.html" class="nav-link">Hadist</a></li>
                <li class="nav-item"><a href="quran.html" class="nav-link active">Al-Quran</a></li>
            </ul>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <h2 class="section-title">Al-Quran</h2>
            <p class="section-subtitle">Juz 30 dengan terjemahan lengkap</p>

            <div class="quran-selector">
                <label for="surahSelect">Pilih Surat:</label>
                <select id="surahSelect" onchange="displaySurah()">
                    <option value="78">78. An-Naba</option>
                    <option value="112">112. Al-Ikhlas</option>
                    <option value="113">113. Al-Falaq</option>
                    <option value="114">114. An-Nas</option>
                </select>
            </div>

            <div class="quran-display" id="quranDisplay"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-watermark">Brizky - MTA Karanganom 1</div>
        <p style="font-weight: 600;">Semoga bermanfaat untuk semua santri</p>
        <p>&copy; 2026 Brizky | TPQ MTA Karanganom 1</p>
    </footer>

    <script>
        const quranData = {
            78: { name: "An-Naba", meaning: "Berita Besar", ayahs: [{ num: 1, arab: "عَمَّ يَتَسَاءَلُونَ", trans: "Tentang apakah mereka saling bertanya-tanya?" }, { num: 2, arab: "عَنِ النَّبَإِ الْعَظِيمِ", trans: "Tentang berita besar (hari kiamat)," }, { num: 3, arab: "الَّذِي هُمْ فِيهِ مُخْتَلِفُونَ", trans: "yang mereka padanya berselisih paham." }, { num: 4, arab: "كَلَّا سَيَعْلَمُونَ", trans: "Sekali-kali tidak, nanti mereka akan mengetahui." }, { num: 5, arab: "ثُمَّ كَلَّا سَيَعْلَمُونَ", trans: "Kemudian sekali-kali tidak, nanti mereka akan mengetahui." }] },
            112: { name: "Al-Ikhlas", meaning: "Keikhlasan", ayahs: [{ num: 1, arab: "قُلْ هُوَ اللَّهُ أَحَدٌ", trans: "Katakanlah: Dia-lah Allah, Yang Maha Esa," }, { num: 2, arab: "اللَّهُ الصَّمَدُ", trans: "Allah adalah Zat yang bergantung padanya segala sesuatu," }, { num: 3, arab: "لَمْ يَلِدْ وَلَمْ يُولَدْ", trans: "Dia tidak beranak dan tidak pula diperanakkan," }, { num: 4, arab: "وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ", trans: "dan tidak ada seorang pun yang setara dengan Dia." }] },
            113: { name: "Al-Falaq", meaning: "Fajar/Subuh", ayahs: [{ num: 1, arab: "قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ", trans: "Katakanlah: Aku berlindung kepada Rabb fajar," }, { num: 2, arab: "مِن شَرِّ مَا خَلَقَ", trans: "dari kejahatan apa yang telah diciptakan-Nya," }, { num: 3, arab: "وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ", trans: "dan dari kejahatan malam apabila telah gelap gulita," }, { num: 4, arab: "وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ", trans: "dan dari kejahatan para penyihir," }, { num: 5, arab: "وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ", trans: "dan dari kejahatan orang yang iri hati." }] },
            114: { name: "An-Nas", meaning: "Manusia", ayahs: [{ num: 1, arab: "قُلْ أَعُوذُ بِرَبِّ النَّاسِ", trans: "Katakanlah: Aku berlindung kepada Rabb manusia," }, { num: 2, arab: "مَلِكِ النَّاسِ", trans: "Raja manusia," }, { num: 3, arab: "إِلَٰهِ النَّاسِ", trans: "Tuhan yang disembah oleh manusia," }, { num: 4, arab: "مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ", trans: "dari kejahatan syaitan yang sering bersembunyi," }, { num: 5, arab: "الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ", trans: "yang membisikkan kejahatan ke dalam dada manusia," }, { num: 6, arab: "مِنَ الْجِنَّةِ وَالنَّاسِ", trans: "dari golongan jin dan manusia." }] }
        };

        function displaySurah() {
            const surahNum = parseInt(document.getElementById('surahSelect').value);
            const surah = quranData[surahNum];
            const display = document.getElementById('quranDisplay');
            display.innerHTML = `
                <div class="surah-header">
                    <div class="surah-info">
                        <h2>Surat ${surah.name}</h2>
                        <p>"${surah.meaning}"</p>
                    </div>
                    <div class="surah-number">
                        <p>Surat</p>
                        <p>${surahNum}</p>
                    </div>
                </div>
                ${surah.ayahs.map(ayah => `
                    <div class="ayah">
                        <div class="ayah-number">${ayah.num}</div>
                        <div class="ayah-text">${ayah.arab}</div>
                        <div class="ayah-translation">${ayah.trans}</div>
                    </div>
                `).join('')}
            `;
        }

        displaySurah();

        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');
        const navLinks = document.querySelectorAll('.nav-link');
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });

        navLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPage) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.navbar')) {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
