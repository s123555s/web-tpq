<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>TPQ MTA Karanganom 1 - Al-Quran</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; overflow-x: hidden; }
        :root { --primary: #059669; --secondary: #10b981; --accent: #14b8a6; --text: #1f2937; --text-light: #6b7280; }
        body { font-family: 'Poppins', sans-serif; color: var(--text); background: linear-gradient(to bottom, #fff, #f0fdf4); }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .navbar-desktop { position: sticky; top: 0; z-index: 1000; background: linear-gradient(135deg, var(--primary), var(--secondary)); box-shadow: 0 5px 20px rgba(5, 150, 105, 0.2); padding: 1rem 2rem; display: none; }
        .navbar-desktop.show { display: block; }
        .navbar-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { color: white; font-size: 1.5rem; font-weight: 900; display: flex; align-items: center; gap: 0.8rem; text-decoration: none; }
        .navbar-brand i { font-size: 1.8rem; }
        .nav-menu { display: flex; list-style: none; gap: 0.3rem; }
        .nav-link { color: white; text-decoration: none; padding: 0.7rem 1.2rem; display: block; font-weight: 600; border-radius: 30px; transition: all 0.3s; font-size: 0.95rem; }
        .nav-link:hover, .nav-link.active { background: white; color: var(--primary); }
        
        .navbar-mobile { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; background: linear-gradient(135deg, var(--primary), var(--secondary)); box-shadow: 0 -5px 20px rgba(5, 150, 105, 0.2); padding: 0; padding-bottom: max(0px, env(safe-area-inset-bottom)); display: none; }
        .navbar-mobile.show { display: flex; }
        .bottom-nav { display: flex; list-style: none; width: 100%; margin: 0; padding: 0; }
        .bottom-nav-item { flex: 1; padding: 0; }
        .bottom-nav-link { color: rgba(255,255,255,0.7); text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.8rem 0.4rem; font-weight: 600; font-size: 0.75rem; transition: all 0.3s; gap: 0.3rem; min-height: 60px; }
        .bottom-nav-link i { font-size: 1.5rem; }
        .bottom-nav-link:active, .bottom-nav-link.active { color: white; background: rgba(255,255,255,0.15); }
        
        body.has-bottom-nav { padding-bottom: 70px; }
        
        .container { max-width: 100%; margin: 0 auto; padding: 0 1rem; }
        .section { padding: 2.5rem 1rem; }
        .section-title { font-size: 1.8rem; text-align: center; margin-bottom: 0.5rem; color: var(--primary); position: relative; display: inline-block; width: 100%; }
        .section-subtitle { text-align: center; color: var(--text-light); font-size: 0.95rem; margin-bottom: 1.5rem; }
        .section-title::after { content: ''; position: absolute; width: 40px; height: 3px; background: linear-gradient(90deg, var(--secondary), var(--accent)); bottom: -10px; left: 50%; transform: translateX(-50%); }
        
        .quran-selector { background: white; padding: 1.2rem; border-radius: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); margin-bottom: 1.5rem; border-top: 3px solid var(--primary); }
        .quran-selector label { display: block; font-weight: 700; color: var(--primary); margin-bottom: 0.8rem; font-size: 1rem; }
        .quran-selector select { width: 100%; padding: 0.8rem; border: 2px solid var(--primary); border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 0.95rem; color: var(--text); cursor: pointer; transition: all 0.3s; }
        .quran-selector select:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1); }
        
        .quran-display { background: white; border-radius: 10px; padding: 1.2rem; box-shadow: 0 3px 10px rgba(0,0,0,0.08); border-left: 3px solid var(--primary); }
        .surah-header { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 2px solid #f0fdf4; }
        .surah-info h2 { font-size: 1.6rem; color: var(--primary); margin-bottom: 0.3rem; }
        .surah-info p { color: var(--text-light); font-size: 0.9rem; }
        .surah-number { background: linear-gradient(135deg, var(--secondary), var(--accent)); color: white; padding: 1rem; border-radius: 10px; text-align: center; box-shadow: 0 3px 10px rgba(5, 150, 105, 0.2); }
        .surah-number p:first-child { font-size: 0.8rem; opacity: 0.9; }
        .surah-number p:last-child { font-size: 2rem; font-weight: 900; }
        
        .ayah { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #f0fdf4; }
        .ayah:last-child { border-bottom: none; }
        .ayah-number { display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--secondary), var(--accent)); color: white; width: 32px; height: 32px; border-radius: 50%; font-weight: 700; margin-bottom: 0.8rem; font-size: 0.9rem; box-shadow: 0 3px 10px rgba(5, 150, 105, 0.2); }
        .ayah-text { background: linear-gradient(135deg, #f0fdf4, #dcfce7); padding: 1rem; border-radius: 8px; border-left: 3px solid var(--primary); margin: 0.8rem 0; font-size: 1.15rem; line-height: 1.8; text-align: right; font-family: Arial, sans-serif; }
        .ayah-translation { background: linear-gradient(135deg, #f0fdf4, #ccfbf1); padding: 0.8rem; border-radius: 8px; border-left: 3px solid var(--accent); margin: 0.8rem 0; line-height: 1.6; font-style: italic; font-size: 0.9rem; }
        
        .footer { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-align: center; padding: 1.5rem; margin-top: 2rem; font-size: 0.9rem; }
        
        @media (min-width: 768px) {
            .navbar-desktop { display: block !important; }
            .navbar-mobile { display: none !important; }
            body.has-bottom-nav { padding-bottom: 0; }
            .section { padding: 3rem 1.5rem; }
            .section-title { font-size: 2.2rem; }
            .surah-header { flex-direction: row; justify-content: space-between; align-items: flex-start; }
            .quran-display { padding: 1.5rem; }
            .ayah-text { font-size: 1.25rem; }
        }
        
        @media (min-width: 1024px) {
            .navbar-container { max-width: 1200px; padding: 0 2rem; }
            .section { padding: 4rem 2rem; }
            .section-title { font-size: 2.8rem; }
            .container { max-width: 1200px; padding: 0 2rem; }
            .quran-display { padding: 2.5rem; }
            .quran-selector { padding: 2rem; }
            .surah-info h2 { font-size: 2.5rem; }
            .ayah-text { font-size: 1.3rem; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar-desktop show">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <i class="fas fa-mosque"></i> TPQ MTA Karanganom 1
            </a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Beranda</a></li>
                <li><a href="program.html" class="nav-link">Program</a></li>
                <li><a href="hadist.html" class="nav-link">Hadist</a></li>
                <li><a href="quran.html" class="nav-link active">Al-Quran</a></li>
            </ul>
        </div>
    </nav>

    <nav class="navbar-mobile show">
        <ul class="bottom-nav">
            <li class="bottom-nav-item">
                <a href="index.html" class="bottom-nav-link">
                    <i class="fas fa-home"></i>
                    <span>Beranda</span>
                </a>
            </li>
            <li class="bottom-nav-item">
                <a href="program.html" class="bottom-nav-link">
                    <i class="fas fa-images"></i>
                    <span>Program</span>
                </a>
            </li>
            <li class="bottom-nav-item">
                <a href="hadist.html" class="bottom-nav-link">
                    <i class="fas fa-book"></i>
                    <span>Hadist</span>
                </a>
            </li>
            <li class="bottom-nav-item">
                <a href="quran.html" class="bottom-nav-link active">
                    <i class="fas fa-quran"></i>
                    <span>Quran</span>
                </a>
            </li>
        </ul>
    </nav>

    <section class="section">
        <div class="container">
            <h2 class="section-title">Al-Quran</h2>
            <p class="section-subtitle">Juz 30 dengan terjemahan lengkap</p>

            <div class="quran-selector">
                <label for="surahSelect">Pilih Surat:</label>
                <select id="surahSelect" onchange="displaySurah()">
                    <option value="78">78. An-Naba</option>
                    <option value="79">79. An-Nazi'at</option>
                    <option value="80">80. Abasa</option>
                    <option value="81">81. At-Takwir</option>
                    <option value="82">82. Al-Infitar</option>
                    <option value="83">83. Al-Muthaffifin</option>
                    <option value="84">84. Al-Insyiqaq</option>
                    <option value="85">85. Al-Buruj</option>
                    <option value="86">86. At-Tariq</option>
                    <option value="87">87. Al-A'la</option>
                    <option value="88">88. Al-Ghasyiah</option>
                    <option value="89">89. Al-Fajr</option>
                    <option value="90">90. Al-Balad</option>
                    <option value="91">91. Asy-Syams</option>
                    <option value="92">92. Al-Lail</option>
                    <option value="93">93. Ad-Duha</option>
                    <option value="94">94. Asy-Syarh</option>
                    <option value="95">95. At-Tin</option>
                    <option value="96">96. Al-'Alaq</option>
                    <option value="97">97. Al-Qadr</option>
                    <option value="98">98. Al-Bayyinah</option>
                    <option value="99">99. Az-Zalzalah</option>
                    <option value="100">100. Al-'Adiyat</option>
                    <option value="101">101. Al-Qari'ah</option>
                    <option value="102">102. At-Takathur</option>
                    <option value="103">103. Al-'Asr</option>
                    <option value="104">104. Al-Humazah</option>
                    <option value="105">105. Al-Fil</option>
                    <option value="106">106. Quraisy</option>
                    <option value="107">107. Al-Ma'un</option>
                    <option value="108">108. Al-Kautsar</option>
                    <option value="109">109. Al-Kafirun</option>
                    <option value="110">110. An-Nasr</option>
                    <option value="111">111. Al-Lahab</option>
                    <option value="112">112. Al-Ikhlas</option>
                    <option value="113">113. Al-Falaq</option>
                    <option value="114">114. An-Nas</option>
                </select>
            </div>

            <div class="quran-display" id="quranDisplay"></div>
        </div>
    </section>

    <footer class="footer">
        <p style="font-weight: 600;">Semoga bermanfaat untuk semua santri</p>
        <p>&copy; 2024 TPQ MTA Karanganom 1</p>
    </footer>

    <script>
        const quranData = {
            78: { name: "An-Naba", meaning: "Berita Besar", ayahs: [{ num: 1, arab: "عَمَّ يَتَسَاءَلُونَ", trans: "Tentang apakah mereka saling bertanya-tanya?" }, { num: 2, arab: "عَنِ النَّبَإِ الْعَظِيمِ", trans: "Tentang berita besar (hari kiamat)," }, { num: 3, arab: "الَّذِي هُمْ فِيهِ مُخْتَلِفُونَ", trans: "yang mereka padanya berselisih paham." }, { num: 4, arab: "كَلَّا سَيَعْلَمُونَ", trans: "Sekali-kali tidak, nanti mereka akan mengetahui." }, { num: 5, arab: "ثُمَّ كَلَّا سَيَعْلَمُونَ", trans: "Kemudian sekali-kali tidak, nanti mereka akan mengetahui." }] },
            79: { name: "An-Nazi'at", meaning: "Para Malaikat Yang Mencabut", ayahs: [{ num: 1, arab: "وَالنَّازِعَاتِ غَرْقًا", trans: "Demi malaikat-malaikat yang mencabut (nyawa) dengan paksa," }, { num: 2, arab: "وَالنَّاشِطَاتِ نَشْطًا", trans: "dan malaikat-malaikat yang mengeluarkan (nyawa) dengan lembut," }, { num: 3, arab: "وَالسَّابِحَاتِ سَبْحًا", trans: "dan malaikat-malaikat yang melayang dengan cepat," }, { num: 4, arab: "فَالسَّابِقَاتِ سَبْقًا", trans: "dan malaikat-malaikat yang berlari cepat," }, { num: 5, arab: "فَالْمُدَبِّرَاتِ أَمْرًا", trans: "dan mereka yang mengurus segala urusan," }] },
            80: { name: "Abasa", meaning: "Dia Bermuram Durja", ayahs: [{ num: 1, arab: "عَبَسَ وَتَوَلَّىٰ", trans: "Dia bermuram durja dan berpaling," }, { num: 2, arab: "أَن جَاءَهُ الْأَعْمَىٰ", trans: "karena datang seorang buta kepadanya," }, { num: 3, arab: "وَمَا يُدْرِيكَ لَعَلَّهُ يَزِكَّىٰ", trans: "dan bagaimana kamu ketahui, boleh jadi dia ingin membersihkan diri," }, { num: 4, arab: "أَوْ يَذَّكَّرُ فَتَنفَعَهُ الذِّكْرَىٰ", trans: "atau dia ingin mengambil pelajaran," }, { num: 5, arab: "أَمَّا مَن اسْتَغْنَىٰ", trans: "Adapun orang-orang yang merasa cukup," }] },
            112: { name: "Al-Ikhlas", meaning: "Keikhlasan", ayahs: [{ num: 1, arab: "قُلْ هُوَ اللَّهُ أَحَدٌ", trans: "Katakanlah: Dia-lah Allah, Yang Maha Esa," }, { num: 2, arab: "اللَّهُ الصَّمَدُ", trans: "Allah adalah Zat yang bergantung padanya segala sesuatu," }, { num: 3, arab: "لَمْ يَلِدْ وَلَمْ يُولَدْ", trans: "Dia tidak beranak dan tidak pula diperanakkan," }, { num: 4, arab: "وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ", trans: "dan tidak ada seorang pun yang setara dengan Dia." }] },
            113: { name: "Al-Falaq", meaning: "Fajar/Subuh", ayahs: [{ num: 1, arab: "قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ", trans: "Katakanlah: Aku berlindung kepada Rabb fajar," }, { num: 2, arab: "مِن شَرِّ مَا خَلَقَ", trans: "dari kejahatan apa yang telah diciptakan-Nya," }, { num: 3, arab: "وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ", trans: "dan dari kejahatan malam apabila telah gelap gulita," }, { num: 4, arab: "وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ", trans: "dan dari kejahatan para penyihir," }, { num: 5, arab: "وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ", trans: "dan dari kejahatan orang yang iri hati." }] },
            114: { name: "An-Nas", meaning: "Manusia", ayahs: [{ num: 1, arab: "قُلْ أَعُوذُ بِرَبِّ النَّاسِ", trans: "Katakanlah: Aku berlindung kepada Rabb manusia," }, { num: 2, arab: "مَلِكِ النَّاسِ", trans: "Raja manusia," }, { num: 3, arab: "إِلَٰهِ النَّاسِ", trans: "Tuhan yang disembah oleh manusia," }, { num: 4, arab: "مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ", trans: "dari kejahatan syaitan yang sering bersembunyi," }, { num: 5, arab: "الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ", trans: "yang membisikkan kejahatan ke dalam dada manusia," }, { num: 6, arab: "مِنَ الْجِنَّةِ وَالنَّاسِ", trans: "dari golongan jin dan manusia." }] }
        };

        function displaySurah() {
            const surahNum = parseInt(document.getElementById('surahSelect').value);
            const surah = quranData[surahNum];
            const display = document.getElementById('quranDisplay');
            display.innerHTML = `
                <div class="surah-header">
                    <div class="surah-info">
                        <h2>Surat ${surah.name}</h2>
                        <p>"${surah.meaning}"</p>
                    </div>
                    <div class="surah-number">
                        <p>Surat</p>
                        <p>${surahNum}</p>
                    </div>
                </div>
                ${surah.ayahs.map(ayah => `
                    <div class="ayah">
                        <div class="ayah-number">${ayah.num}</div>
                        <div class="ayah-text">${ayah.arab}</div>
                        <div class="ayah-translation">${ayah.trans}</div>
                    </div>
                `).join('')}
            `;
        }

        displaySurah();

        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-link, .bottom-nav-link').forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPage || (currentPage === '' && href === 'index.html')) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    </script>
</body>
</html>
